name: Build & Release StemCut

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write # nécessaire pour créer une Release GitHub

jobs:
  # Vérifie si la release a déjà des assets pré-compilés — si oui, le build est ignoré
  check-prebuilt:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      has_assets: ${{ steps.check.outputs.has_assets }}
    steps:
      - name: Check for existing release assets
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh release view ${{ github.ref_name }} --repo ${{ github.repository }} --json assets --jq '.assets | length' 2>/dev/null || echo 0)
          echo "has_assets=$([ "$count" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Assets existants : $count"

  build:
    needs: check-prebuilt
    if: |
      always() &&
      (needs.check-prebuilt.result == 'skipped' || needs.check-prebuilt.outputs.has_assets != 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # arm64 (Apple Silicon)
            arch: arm64
            python_arch: arm64
            artifact_name: StemCut-arm64.dmg
            artifact_glob: dist/StemCut-*.dmg

          - os: macos-latest # x86_64 via Rosetta (macos-13 déprécié)
            arch: x64
            python_arch: x64
            artifact_name: StemCut-x64.dmg
            artifact_glob: dist/StemCut-*.dmg

          - os: windows-latest
            arch: x64
            python_arch: x64
            artifact_name: StemCut-Setup.exe
            artifact_glob: dist/StemCut*.exe

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Python ──────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}

      # ── Cache pip ───────────────────────────────────────────────────────
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('backend/requirements.txt') }}

      # ── npm install ─────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: |
          npm install
          cd frontend && npm install

      # ── Python venv + dépendances (macOS arm64) ──────────────────────────
      - name: Install Python dependencies (macOS arm64)
        if: runner.os == 'macOS' && matrix.arch == 'arm64'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r backend/requirements.txt

      # ── Python venv + dépendances (macOS x64 via Rosetta) ────────────────
      # setup-python avec architecture: x64 installe Python 3.11 x86_64 via Rosetta
      - name: Install Python dependencies (macOS x64 via Rosetta)
        if: runner.os == 'macOS' && matrix.arch == 'x64'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r backend/requirements.txt

      # ── Python venv + dépendances (Windows — PyTorch CPU only) ──────────
      # CPU-only car les runners GH Actions n'ont pas de GPU CUDA
      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          # PyTorch CPU (évite de télécharger ~2 Go de CUDA inutilement)
          .venv\Scripts\pip install torch==2.2.0 torchaudio==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          # Reste des dépendances (torch déjà installé, sera ignoré)
          .venv\Scripts\pip install -r backend/requirements.txt

      # ── Build frontend Next.js ───────────────────────────────────────────
      - name: Build frontend
        run: npm run build:frontend

      # ── Electron build (macOS) ───────────────────────────────────────────
      - name: Build Electron (macOS arm64)
        if: runner.os == 'macOS' && matrix.arch == 'arm64'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          ln -sfn "$(pwd)/.venv" _venv
          npx electron-builder --mac dmg --arm64 --publish never
          rm -f _venv

      - name: Build Electron (macOS x64)
        if: runner.os == 'macOS' && matrix.arch == 'x64'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          ln -sfn "$(pwd)/.venv" _venv
          npx electron-builder --mac dmg --x64 --publish never
          rm -f _venv

      # ── Electron build (Windows) ─────────────────────────────────────────
      - name: Build Electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Junction -Path _venv -Target "$((Get-Location).Path)\.venv" -Force
          npx electron-builder --win nsis --publish never
          Remove-Item _venv -Force -Recurse -ErrorAction SilentlyContinue

      # ── Upload artifact ──────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ── Créer une Release GitHub avec les artefacts disponibles ──────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
