name: Build macOS DMG

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-arm64-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-arm64-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies + PyInstaller
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller

      - name: Build backend binary (PyInstaller)
        run: |
          cd backend
          pyinstaller stemcut_backend.spec \
            --distpath "${{ github.workspace }}/dist-backend" \
            --workpath "${{ github.workspace }}/build-backend" \
            --noconfirm

      - name: Build frontend (Next.js)
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true

      - name: Package DMG
        run: npx electron-builder --mac dmg --arm64 --publish=never

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-arm64
          path: dist/*.dmg
          retention-days: 7

  # ── Crée la release GitHub une seule fois avec les deux DMGs ──────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          merge-multiple: true
          path: dmgs/

      - name: List DMGs
        run: ls -lh dmgs/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: dmgs/*.dmg
          draft: true
          generate_release_notes: true
