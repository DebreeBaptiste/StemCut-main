name: Build

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (arm64)
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-arm64-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-arm64-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies + PyInstaller
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller

      - name: Build backend binary (PyInstaller)
        run: |
          cd backend
          pyinstaller stemcut_backend.spec \
            --distpath "${{ github.workspace }}/dist-backend" \
            --workpath "${{ github.workspace }}/build-backend" \
            --noconfirm

      - name: Build frontend (Next.js)
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true

      - name: Package DMG
        run: npx electron-builder --mac dmg --arm64 --publish=never

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-arm64
          path: dist/*.dmg
          retention-days: 7

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-win-py3.11-${{ hashFiles('backend/requirements.txt') }}-torch2.2.0cpu-pyinstaller

      - name: Create Python venv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install torch==2.2.0 torchaudio==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          .venv\Scripts\pip install -r backend/requirements.txt
          .venv\Scripts\pip install pyinstaller

      - name: Build backend binary (PyInstaller)
        run: |
          cd backend
          ..\.venv\Scripts\python.exe -m PyInstaller stemcut_backend.spec `
            --distpath "${{ github.workspace }}\dist-backend" `
            --workpath "${{ github.workspace }}\build-backend" `
            --noconfirm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Next.js)
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true

      - name: Package NSIS installer
        run: |
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          npx electron-builder --win nsis --publish never

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-win-x64
          path: dist/*.exe
          retention-days: 7

  # ── Crée la release GitHub avec le DMG macOS et l'installeur Windows ──────
  release:
    name: Create Release
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '{dmg-*,exe-*}'
          merge-multiple: true
          path: release-files/

      - name: List release files
        run: ls -lh release-files/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: true
          generate_release_notes: true
